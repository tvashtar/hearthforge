name: The Missing Caravan
premise: >
  A trade caravan bound for Dunmere vanished on the Old Fen Road three days
  ago. The merchants' guild in the village of Bracken Hollow is offering 50
  gold for answers. Bandits led by a brute called Varrik the Red are
  suspected.
player_persona: >
  You are playing Kira, a pragmatic human fighter, blunt and brave, traveling
  with Brother Aldric, a dwarf cleric companion. You speak in first person,
  in-character, 1-3 sentences per message. You roll your own physical dice
  when the DM asks: report the raw number the notes for the current goal give
  you; if the notes give no number, say "roll for me" to delegate to the DM.
  Never narrate outcomes yourself; state intent and let the DM resolve it.
pc_name: Kira
start_day: 1
start_time: "18:00"
party:
  - name: Kira
    role: pc
    class_slug: fighter
    race_slug: human
    abilities: {str: 16, dex: 14, con: 14, int: 10, wis: 12, cha: 8}
    ac: 16
    proficiencies: {skills: [athletics, intimidation]}
    attacks: [{weapon: longsword, name: longsword}]
    items:
      - {item: gold pieces, quantity: 60}
  - name: Brother Aldric
    role: companion
    class_slug: cleric
    race_slug: hill-dwarf
    level: 3
    abilities: {str: 14, dex: 8, con: 15, int: 10, wis: 15, cha: 12}
    ac: 18
    proficiencies: {skills: [medicine, religion]}
    attacks: [{weapon: mace, name: mace}]
    spells_known: [bless, healing-word, cure-wounds, sacred-flame, guiding-bolt]
starting_region:
  locations:
    - slug: bracken-hollow
      name: Bracken Hollow
      description: A fenland trade village of stilt-houses and peat smoke.
      region: The Fenmarch
    - slug: old-fen-road
      name: The Old Fen Road
      description: A raised causeway through the marsh, wide enough for carts.
      region: The Fenmarch
  npcs:
    - name: Marla Underbough
      disposition: friendly
      location_slug: bracken-hollow
      notes: {role: innkeeper of the Heron's Rest, knows caravan gossip}
    - name: Guildmaster Fenn
      disposition: neutral
      location_slug: bracken-hollow
      notes: {role: merchants' guild master, posted the 50gp reward}
quest:
  name: The Missing Caravan
  description: Find out what happened to the Dunmere caravan on the Old Fen Road.
scene:
  location_slug: bracken-hollow
  description: >
    Evening in the common room of the Heron's Rest. Marla Underbough tends
    the bar; the guild reward notice is nailed by the door.
beats:
  - id: question-innkeeper
    goal: Ask Marla the innkeeper what she knows about the missing caravan,
      then tell the DM you want to make an Insight (or Persuasion) check to
      read what she is holding back about Varrik the Red — say you rolled a
      17 on your d20 for it.
    notes: You already rolled your d20 for the check; report 17 as the raw roll.
    max_player_messages: 4
    done_when: {command: skill_check, ok: true}
  - id: buy-supplies
    goal: Buy a healing potion before leaving, pay for it, and ask the DM to
      record it on your character sheet inventory.
    max_player_messages: 5
    done_when: {command: add_item, ok: true, inputs: {character: Kira}}
  - id: travel-to-ambush
    goal: Set out along the Old Fen Road toward where the caravan vanished.
    max_player_messages: 3
    done_when: {command: travel, ok: true}
  - id: investigate-wreckage
    goal: Search the wrecked caravan carefully for clues about the attackers
      and any survivors.
    notes: If the DM asks for a d20 roll, report 14.
    max_player_messages: 4
    done_when: {command: skill_check, ok: true}
  - id: fight-bandits
    goal: Bandits attack — two rush you with blades while a third with a
      crossbow hangs back far across the marsh, out of anyone's reach.
      Fight them. Engage the nearest bandit in melee with your longsword.
    notes: >
      This encounter is fixed — the DM must run exactly these enemies and
      not substitute or homebrew a different monster: two Bandits closing to
      melee (near) and one Bandit with a light crossbow holding position far
      across the marsh. If the DM invents a different creature or drops the
      far crossbowman, restate the ambush as written before acting. If asked
      for initiative report 12. If asked for an attack roll report 18, damage
      7. On later attacks say "roll for me".
    max_player_messages: 8
    done_when: {command: attack, ok: true}
  - id: illegal-action
    goal: Insist on swinging your longsword at the far-off crossbowman from
      exactly where you stand. Do not move, do not close the distance, do
      not throw the sword. If the DM narrates you closing in or suggests
      anything else, repeat that you stay put and swing, and ask for the
      attack roll to be resolved as declared.
    notes: This is deliberately impossible — you want the table ruling, not
      a workaround. Refuse every alternative the DM offers.
    max_player_messages: 5
    # TVA-65: a correct engine-first DM may refuse this in narration and
    # never call attack. The beat passes on EITHER path: (1) the engine
    # surfaces the "cannot reach" refusal, or (2) the DM abstains — it
    # neither resolves a successful swing for Kira nor takes a workaround
    # (engage/move to close the distance). Fabricating a hit or closing in
    # trips the none_of clause and fails the beat.
    done_when:
      any_of:
        - {command: attack, ok: false, refusal_contains: "cannot reach"}
        - none_of:
            - {command: attack, ok: true, inputs: {attacker: Kira}}
            - {command: engage, inputs: {combatant: Kira}}
            - {command: move, inputs: {combatant: Kira}}
  - id: tier1-heal
    goal: Brother Aldric is hurt. Ask him to cast Healing Word on himself
      (or on you if you are hurt instead).
    max_player_messages: 4
    done_when: {command: cast_spell, ok: true}
  - id: wrap-up
    goal: Finish the fight, loot the bodies, and then tell the DM you want to
      end the session here.
    notes: Say "roll for me" for any remaining dice. After looting, say clearly
      "let's end the session here".
    max_player_messages: 10
    done_when: {command: end_session, ok: true}
